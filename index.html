<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3SW2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body{
            background:linear-gradient(160deg,#baebc2 0%,#deb6c5 70%);
            font-family:'Baloo 2',cursive;
            margin:0;
        }
        .card{
            border-radius:20px;
            background:#fff9e6;
            box-shadow:0 12px 25px rgba(0,0,0,0.12);
            border:3px solid #b0a58c;
            animation:popIn .6s ease-out;
        }
        @keyframes popIn{
            0%{transform:scale(.7);opacity:0}
            100%{transform:scale(1);opacity:1}
        }
        h2{
            color:#5d4037;
            font-weight:800;
            text-shadow:1px 1px #a1887f;
        }
        .form-label{
            font-size:1.15rem;
            color:#4e342e;
            margin-bottom:.4rem;
        }
        .form-check-input{
            cursor:pointer;
            width:1.3rem;
            height:1.3rem;
            margin-top:.2rem;
        }
        .form-check-label{
            margin-left:.4rem;
            font-size:1.1rem;
            color:#5d4037;
        }
        select{
            border-radius:20px;
            background-color:#f9fbe7;
            border:2px solid #a5d6a7;
            padding:.4rem .6rem;
            font-size:1rem;
        }
        .btn-signup{
            background:linear-gradient(135deg,#8d6e63,#bcaaa4);
            border:none;
            color:#fff;
            font-size:1.2rem;
            font-weight:600;
            border-radius:30px;
            padding:.8rem 1.2rem;
            letter-spacing:.8px;
            transition:transform .2s ease,box-shadow .2s ease;
            box-shadow:0 4px 12px rgba(141,110,99,.4);
        }
        .btn-signup:hover{
            transform:translateY(-4px) rotate(-2deg);
            box-shadow:0 8px 20px rgba(141,110,99,.6);
        }
        .btn-signup:active{
            transform:translateY(2px) rotate(0deg);
            box-shadow:0 2px 6px rgba(141,110,99,.3);
        }
        #output{
            font-size:1.3rem;
            color:#4e342e;
            text-align:center;
            animation:popIn .5s ease-out;
        }
        #image img{
            border-radius:12px;
            box-shadow:0 6px 12px rgba(0,0,0,.12);
        }
        @keyframes bounce{
            0%{transform:translateY(0)}
            30%{transform:translateY(-8px)}
            60%{transform:translateY(4px)}
            100%{transform:translateY(0)}
        }
        .bounce{animation:bounce .6s ease}
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 w-75 mx-2">
        <h2 class="text-center mb-4">It's Intrams!</h2>
        <form>
            <div class="mb-3">
                <label class="form-label">Are you registered?</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="registration" value="registered" id="reg-yes">
                    <label class="form-check-label" for="reg-yes">Yes</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="registration" value="notRegistered" id="reg-no">
                    <label class="form-check-label" for="reg-no">No</label>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Will you break?</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="clearance" value="cleared" id="clear-no">
                    <label class="form-check-label" for="clear-no">No</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="clearance" value="notCleared" id="clear-yes">
                    <label class="form-check-label" for="clear-yes">Yes</label>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Grade & Section?</label>
                <select id="grade" class="form-select mb-2">
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                </select>
                <select id="section" class="form-select">
                    <option value="emerald">Emerald</option>
                    <option value="ruby">Ruby</option>
                </select>
            </div>
            <div class="d-grid">
                <input type="button"
                       value="Sign up"
                       class="btn btn-signup"
                       py-click="intrams_checker">
            </div>
        </form>
        <center class="mt-4">
            <div id="output" class="mt-3 fw-bold"></div>
            <div id="image" class="mt-3"></div>
        </center>
    </div>
    <py-script src="main.py"></py-script>
</body>
</html>
